<!DOCTYPE html>
<html>

<head>
    <title>Redirecting to Palz...</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        // Configuration
        var WEB_APP_URL = "https://play.palzgame.com";
        var CALLBACK_PATH = "/Wallet/onto-callback";

        // Get all parameters ONTO sent (either query string or hash fragment)
        var params = window.location.search;

        // If no query params, try hash fragment
        if (!params || params === "") {
            params = window.location.hash;
            if (params.startsWith("#")) {
                params = "?" + params.substring(1);
            }
        }

        // Log for debugging
        console.log("[ONTO Callback] Received params:", params);

        // Build redirect URL back to the web app
        // This will pass the ONTO authentication data as query parameters
        var redirectUrl = WEB_APP_URL + CALLBACK_PATH + params;

        console.log("[ONTO Callback] Redirecting to:", redirectUrl);

        // Redirect immediately to web app
        window.location.href = redirectUrl;

        // Fallback: try again after 1 second if first attempt fails
        setTimeout(function () {
            console.log("[ONTO Callback] Fallback redirect attempt");
            window.location.href = redirectUrl;
        }, 1000);
    </script>
</head>

<body
    style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; text-align: center; padding: 50px 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;">
    <div
        style="background: white; padding: 40px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); max-width: 400px;">
        <h2 style="color: #333; margin-top: 0;">🎮 Redirecting to Palz...</h2>
        <p style="color: #666; margin: 20px 0;">Connecting your ONTO wallet to your account</p>

        <div style="margin: 30px 0;">
            <div
                style="width: 40px; height: 40px; border: 4px solid #667eea; border-radius: 50%; border-top-color: transparent; animation: spin 1s linear infinite; margin: 0 auto;">
            </div>
        </div>

        <p style="color: #999; font-size: 14px;">If you're not redirected automatically:</p>
        <a id="manualLink" href="#"
            style="display: inline-block; padding: 12px 30px; background: #667eea; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; margin-top: 10px; transition: background 0.3s;">
            Tap here to continue
        </a>
    </div>

    <style>
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>

    <script>
        // Update manual link with params
        var manualLink = document.getElementById("manualLink");
        var params = window.location.search || window.location.hash;
        if (params.startsWith("#")) {
            params = "?" + params.substring(1);
        }
        manualLink.href = WEB_APP_URL + CALLBACK_PATH + params;

        // Debug: Log the final redirect URL
        console.log("[ONTO Callback] Manual link URL:", manualLink.href);
    </script>
</body>

</html>
